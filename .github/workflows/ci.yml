name: Java CI with Gradle & PMD

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build, Test, and Run PMD
        run: ./gradlew clean build
        env:
          DB_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
          DB_USERNAME: sa
          DB_PASSWORD: password

  deploy-staging:
    name: Dummy CD (Staging - Railway)
    runs-on: ubuntu-latest
    needs: [ build-and-check ]
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Trigger Railway Staging Deployment
        run: |
          echo "✅ CI Backend Lulus! Memicu deployment ke Railway Environment: Staging..."
          echo "⚙️ Menjalankan perintah: railway up --environment=staging"
          echo "🌐 API Staging URL Target: (URL Railway Staging Sementara)"


    deploy-production:
      name: Dummy CD (Production - Railway)
      runs-on: ubuntu-latest
      needs: [ build-and-check ]
      if: github.ref == 'refs/heads/main'
      steps:
        - name: Trigger Railway Production Deployment
          run: |
            echo "🚀 CI Backend Lulus! Memicu deployment ke Railway Environment: Production..."
            echo "⚙️ Menjalankan perintah: railway up --environment=production"
            echo "🌐 API Production URL Target: https://api.yomu.info"