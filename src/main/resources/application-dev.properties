spring.application.name=yomu

# --- Database Configuration (H2 In-Memory for Development) ---
spring.datasource.url=jdbc:h2:mem:yomudb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA & Hibernate ---
# Create database schema automatically
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in console for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Console ---
# Enable H2 web console for development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
