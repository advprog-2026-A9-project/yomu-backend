# ==========================================
# DEVELOPMENT CONFIGURATION (LOCAL)
# ==========================================

# --- Database Configuration (H2 In-Memory) ---
spring.datasource.url=jdbc:h2:mem:yomudb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA & Hibernate ---
# Hancurkan dan buat ulang tabel setiap kali aplikasi menyala agar bersih
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Tampilkan query SQL di console untuk bantu debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- SQL Data Initialization (Trik data.sql) ---
# Jalankan data.sql setiap kali aplikasi menyala di mode dev
#spring.sql.init.mode=always
# WAJIB: Tunggu Hibernate selesai membuat tabel, baru masukkan data (Mencegah error 'Kategori tidak ditemukan')
#spring.jpa.defer-datasource-initialization=true

# --- H2 Console (Development Only) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Logging (Development Only) ---
# Tulis log ke file lokal agar mudah ditail dari terminal PowerShell.
logging.file.name=app.log
logging.level.id.ac.ui.cs.advprog.yomu=INFO