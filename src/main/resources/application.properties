spring.application.name=yomu

# --- Database Configuration (H2 In-Memory for Local Development) ---
# For production with Neon DB, use environment variables or set spring.profiles.active=prod
spring.datasource.url=jdbc:h2:mem:yomudb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA & Hibernate ---
# Create database schema automatically
spring.jpa.hibernate.ddl-auto=create-drop
# Tampilkan query SQL di console (bantu debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Console (Development Only) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Monitoring (Actuator) ---
# Wajib untuk Health Check di Koyeb
management.endpoints.web.exposure.include=health,info

server.port=${PORT:8080}

# --- Google OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile