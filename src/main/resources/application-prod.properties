# ==========================================
# PRODUCTION CONFIGURATION (NEON DB / POSTGRESQL)
# ==========================================

# --- Database Configuration ---
# Value diambil otomatis dari Environment Variables server
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA & Hibernate ---
# Update skema database otomatis jika ada perubahan entity
spring.jpa.hibernate.ddl-auto=update
# Matikan log SQL di production demi performa dan keamanan
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- SQL Data Initialization ---
# SANGAT PENTING: Matikan eksekusi data.sql di production agar data aman!
spring.sql.init.mode=never

# --- Keamanan Tambahan ---
# Pastikan H2 console benar-benar mati di production
spring.h2.console.enabled=false