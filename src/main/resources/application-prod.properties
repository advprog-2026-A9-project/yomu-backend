spring.application.name=yomu

# --- Database Configuration (Neon PostgreSQL for Production) ---
# Mengambil value dari Environment Variables di server/production
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA & Hibernate ---
# Update skema database otomatis jika ada perubahan entity
spring.jpa.hibernate.ddl-auto=update
# Jangan show SQL di production (performance & security)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Monitoring (Actuator) ---
# Wajib untuk Health Check di Koyeb
management.endpoints.web.exposure.include=health,info

# --- H2 Console (Disabled for Production) ---
spring.h2.console.enabled=false
